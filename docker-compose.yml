version: "3.9"

services:
  qb-connector:
    build: .
    container_name: yc-qb-connector
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qb-connector.rule=Host(`qb.yourdomain.com`)"
      - "traefik.http.routers.qb-connector.tls=true"
      - "traefik.http.routers.qb-connector.tls.certresolver=letsencrypt"
