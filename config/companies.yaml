# Company configuration for QBWC connector
# Each company maps to a separate Postgres schema in Supabase.
# The schema must exist before sync runs (see migrations/bootstrap.sql).

companies:
  natures_storehouse:
    display_name: "Nature's Storehouse"
    pg_schema: "natures_storehouse"          # Postgres schema for all QB data
    qb_company_file: ""                      # Leave blank = use whatever QB has open
    # QB Enterprise runs on Windows 24/7; QBWC handles the file path
    qwc_app_name: "YC QB Connector - Nature's"
    qwc_app_url: "https://your-server.example.com/qbwc/"
    qwc_app_support_url: "https://your-server.example.com/"
    sync_interval_minutes: 60
    max_returned: 100                        # Per-company override (or remove to use global)
    enabled_entities:
      # Reference data (synced first)
      - accounts
      - classes
      - sales_tax_codes
      - payment_methods
      - ship_methods
      - terms
      - customers
      - vendors
      - employees
      - items
      # Transactions
      - purchase_orders
      - bills
      - bill_payments
      - vendor_credits
      - estimates
      - sales_orders
      - invoices
      - sales_receipts
      - credit_memos
      - receive_payments
      - deposits
      - checks
      - credit_card_charges
      - credit_card_credits
      - journal_entries
      - transfers
      - inventory_adjustments
      - time_tracking

  adk_fragrance:
    display_name: "Adirondack Fragrance Farm"
    pg_schema: "adk_fragrance"               # Postgres schema for all QB data
    qb_company_file: ""
    qwc_app_name: "YC QB Connector - ADK"
    qwc_app_url: "https://your-server.example.com/qbwc/"
    qwc_app_support_url: "https://your-server.example.com/"
    sync_interval_minutes: 60
    max_returned: 100
    enabled_entities:
      - accounts
      - classes
      - sales_tax_codes
      - payment_methods
      - ship_methods
      - terms
      - customers
      - vendors
      - employees
      - items
      - purchase_orders
      - bills
      - bill_payments
      - vendor_credits
      - estimates
      - sales_orders
      - invoices
      - sales_receipts
      - credit_memos
      - receive_payments
      - deposits
      - checks
      - credit_card_charges
      - credit_card_credits
      - journal_entries
      - transfers
      - inventory_adjustments
      - time_tracking
