# Company configuration for QBWC connector
# Each company maps to a separate Postgres schema in Supabase.
# The schema must exist before sync runs (see migrations/bootstrap.sql).

companies:
  adk_fragrance:
    display_name: "Sandy Maine Inc (Adirondack Fragrance Farm)"
    pg_schema: "adk_fragrance"
    qb_company_file: ""
    qwc_app_name: "YC QB Connector - ADK"
    qwc_app_url: "https://yc-qb-web-connector.vercel.app/qbwc/"
    qwc_app_support_url: "https://yc-qb-web-connector.vercel.app/"
    sync_interval_minutes: 60
    max_returned: 100
    enabled_entities:
      - qb_preferences
      - accounts
      - classes
      - sales_tax_codes
      - payment_methods
      - ship_methods
      - terms
      - unit_of_measure_sets
      - customers
      - vendors
      - employees
      - items
      - inventory_items
      - assembly_bom
      - inventory_sites
      - build_assemblies
      - purchase_orders
      - item_receipts
      - bills
      - bill_payments
      - vendor_credits
      - estimates
      - sales_orders
      - invoices
      - sales_receipts
      - credit_memos
      - receive_payments
      - deposits
      - checks
      - credit_card_charges
      - credit_card_credits
      - journal_entries
      - transfers
      - inventory_adjustments
      - time_tracking

  yc_works:
    # YC Works LLC dba Nature's Storehouse - same legal entity (LaBella docs).
    # Canonical schema for the Canton, NY operation. The legacy
    # `natures_storehouse` schema was dropped 2026-05-05 (it was empty).
    display_name: "YC Works LLC dba Nature's Storehouse"
    pg_schema: "yc_works"
    qb_company_file: ""
    qwc_app_name: "YC QB Connector - YC Works"
    qwc_app_url: "https://yc-qb-web-connector.vercel.app/qbwc/"
    qwc_app_support_url: "https://yc-qb-web-connector.vercel.app/"
    sync_interval_minutes: 60
    max_returned: 100
    # pdpRequired: needed for paycheck detail visibility on QB Enterprise +
    # active Payroll subscription. Without it, paycheck line items come back
    # truncated even though the SDK app has full access.
    personal_data_pref: "pdpRequired"
    enabled_entities:
      # Payroll-specific (yc_works has active Payroll subscription)
      - payroll_items_wage
      - payroll_items_non_wage
      - billing_rates
      - paychecks
      - accounts
      - classes
      - sales_tax_codes
      - payment_methods
      - ship_methods
      - terms
      - unit_of_measure_sets
      - customers
      - vendors
      - employees
      - items
      - inventory_items
      - assembly_bom
      - purchase_orders
      - item_receipts
      - bills
      - bill_payments
      - vendor_credits
      - estimates
      - sales_orders
      - invoices
      - sales_receipts
      - credit_memos
      - receive_payments
      - deposits
      - checks
      - credit_card_charges
      - credit_card_credits
      - journal_entries
      - transfers
      - inventory_adjustments
      - time_tracking

