    display_name: "Maine & Maine, LLC"
    pg_schema: "maine_and_maine"
    qb_company_file: ""
    qwc_app_name: "YC QB Connector - Maine & Maine"
    qwc_app_url: "https://yc-qb-web-connector.vercel.app/qbwc/"
